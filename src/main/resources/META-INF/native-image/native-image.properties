# GraalVM Native Image configuration for BouncyCastle
# Based on GraalVM reachability metadata for bcpkix-jdk18on.
# Force initialization of BC's AES mappings class that GraalVM needs for AES to work.
Args = --initialize-at-build-time=org.bouncycastle.jcajce.provider.symmetric.AES \
       --initialize-at-build-time=org.bouncycastle.crypto.engines.AESEngine
