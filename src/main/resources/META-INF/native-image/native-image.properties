# GraalVM Native Image configuration
# NOTE: Do NOT use --initialize-at-build-time=org.bouncycastle.** — BC's crypto
# classes initialize correctly at runtime on native image when used via direct API
# (AESEngine, X25519PrivateKeyParameters.generateSecret) without JCA provider registration.
# The wildcard causes CryptoServicesRegistrar state corruption that breaks AES output.
Args = --initialize-at-build-time=org.bouncycastle.crypto.engines.AESEngine
