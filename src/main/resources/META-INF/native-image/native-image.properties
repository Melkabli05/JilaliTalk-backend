# GraalVM Native Image configuration
# Initialize BouncyCastle crypto classes at build time so they are
# available in the native binary without runtime classpath issues.
Args = --initialize-at-build-time=org.bouncycastle.jce.provider.BouncyCastleProvider \
       --initialize-at-build-time=org.bouncycastle.crypto.engines.AESEngine \
       --initialize-at-build-time=org.bouncycastle.crypto.generators.X25519KeyPairGenerator \
       --initialize-at-build-time=org.bouncycastle.crypto.params.X25519PrivateKeyParameters \
       --initialize-at-build-time=org.bouncycastle.crypto.params.X25519PublicKeyParameters \
       --initialize-at-build-time=org.bouncycastle.crypto.agreement.X25519Agreement \
       --initialize-at-build-time=org.bouncycastle.util.encoders.Hex \
       --initialize-at-build-time=org.bouncycastle.util.encoders.HexEncoder \
       --initialize-at-build-time=org.bouncycastle.crypto.CryptoServicesRegistrar \
       --initialize-at-build-time=org.bouncycastle.crypto.ConfigurableCryptoServicesRegistrar
