components:
  schemas:
    ApproveManagerRequest:
      required:
      - cname
      - host_id
      - operation_type
      type: object
      properties:
        operation_type:
          minLength: 1
          type: string
        cname:
          minLength: 1
          type: string
        host_id:
          type: integer
          format: int64
    BatchChannelStatus:
      required:
      - cname
      - room_status
      type: object
      properties:
        cname:
          type: string
        room_status:
          type: integer
          format: int32
        ended_at:
          type: integer
          format: int64
          nullable: true
    BatchQueryRequest:
      required:
      - cnames
      type: object
      properties:
        cnames:
          minItems: 1
          type: array
          items:
            type: string
    BatchQueryResponse:
      type: object
      properties:
        items:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/BatchChannelStatus"
    BatchStatusRequest:
      required:
      - user_ids
      type: object
      properties:
        user_ids:
          minItems: 1
          type: array
          items:
            type: integer
            format: int64
    BatchStatusResponse:
      type: object
      properties:
        others:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/UserOnlineStatus"
        list:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/UserOnlineStatus"
    CaptionEntry:
      required:
      - _id
      - create_at
      - nick_name
      - text
      - user_id
      type: object
      properties:
        _id:
          type: string
        user_id:
          type: integer
          format: int64
        nick_name:
          type: string
        nationality:
          type: string
          nullable: true
        text:
          type: string
        create_at:
          type: integer
          format: int64
    CaptionHistoryResponse:
      required:
      - has_more
      type: object
      properties:
        list:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/CaptionEntry"
        has_more:
          type: boolean
    CaptionSwitchRequest:
      required:
      - busi_type
      - caption_status
      - cname
      - is_try_out
      type: object
      properties:
        busi_type:
          type: integer
          format: int32
        cname:
          minLength: 1
          type: string
        caption_status:
          type: integer
          format: int32
        is_try_out:
          type: boolean
    Category:
      required:
      - id
      - name
      type: object
      properties:
        topics:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/Topic"
        id:
          type: integer
          format: int64
        name:
          type: string
        bg_color:
          type: string
          nullable: true
        font_color:
          type: string
          nullable: true
    CategoryTopicListResponse:
      type: object
      properties:
        items:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/Category"
    CategoryTopicTag:
      required:
      - category_id
      - category_name
      type: object
      properties:
        category_id:
          type: integer
          format: int64
        category_name:
          type: string
        topic_id:
          type: integer
          format: int64
          nullable: true
        topic_name:
          type: string
          nullable: true
        bg_color:
          type: string
          nullable: true
        font_color:
          type: string
          nullable: true
    Channel:
      required:
      - busi_type
      - cname
      - lang_id
      - name
      - room_status
      - total_user_count
      type: object
      properties:
        cname:
          type: string
        busi_type:
          type: integer
          format: int32
        name:
          type: string
        description:
          type: string
          nullable: true
        lang_id:
          type: integer
          format: int32
        langs:
          type: array
          nullable: true
          items:
            type: integer
            format: int32
        room_status:
          type: integer
          format: int32
        total_user_count:
          type: integer
          format: int32
        heat_value:
          type: integer
          format: int32
          nullable: true
    ChannelListItem:
      required:
      - channel
      - host_user
      type: object
      properties:
        channel:
          $ref: "#/components/schemas/Channel"
        host_user:
          $ref: "#/components/schemas/HostUser"
        users:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/RoomUser"
        token:
          type: string
          nullable: true
        background_url:
          type: string
          nullable: true
        category_topic_tag:
          nullable: true
          allOf:
          - $ref: "#/components/schemas/CategoryTopicTag"
      description: "Room listing item shared across discovery endpoints (channel_list,\
        \ recommend, end-page). Fields are limited to what a frontend actually renders;\
        \ we deliberately do not transcribe every upstream field, since modeling unused\
        \ data is just a different kind of bloat."
    ChannelListResponse:
      type: object
      properties:
        items:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/ChannelListItem"
      description: "Wrapper for the {items:\\[...\\]} listing payloads."
    Comment:
      type: object
      properties:
        id:
          type: string
          nullable: true
        user_id:
          type: integer
          format: int64
          nullable: true
        content:
          type: string
          nullable: true
      description: "Room comment item. The upstream payload is loosely specified (items\
