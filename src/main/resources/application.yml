micronaut:
  application:
    name: jilalibff
  server:
    port: 8080
    cors:
      enabled: true
      configurations:
        all:
          allowed-origins:
            - http://localhost:4200
            - http://localhost:4201
            - http://localhost:3000
            - https://jilali-talk-frontend-sfrr-one.vercel.app
          allowed-methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
          allowed-headers:
            - Content-Type
            - Authorization
            - X-Requested-With
            - Accept
            - Origin
            - Access-Control-Request-Method
            - Access-Control-Request-Headers
          exposed-headers:
            - Access-Control-Allow-Origin
            - Access-Control-Allow-Credentials
          allow-credentials: true
          max-age: 3600
  router:
    static-resources:
      swagger:
        paths: classpath:META-INF/swagger
        mapping: /swagger/**
      swagger-ui:
        paths: classpath:META-INF/swagger/views/swagger-ui
        mapping: /swagger-ui/**
  executors:
    blocking:
      virtual: true
  http:
    services:
      jlhub:
        url: ${LIVEHUB_BASE_URL:`https://api-global.hellotalk8.com`}
        read-timeout: 10s
        connect-timeout: 5s
        security:
          enabled: false
  serde:
    enabled: true
    deserialization:
      ignore-unknown: true
  openapi:
    views:
      spec: swagger-ui.enabled=true
  caches:
    # Caches JilaliGateway.userInfo() — profile lookups are encrypted round-trips
    # (Curve25519 exchange + AES) and the same userId is requested repeatedly
    # (every room roster, comment author, notification avatar). Long-lived by design:
    # profile fields (nickname/avatar/VIP status) change rarely, so entries stay cached
    # as long as they keep being accessed (expire-after-access, not a fixed write TTL) —
    # a popular host's profile never re-pays the handshake while people keep joining
    # their room, while cold/inactive entries still age out to bound memory.
    user-info:
      expire-after-access: 24h
      maximum-size: 20000
    # Caches near-static room reference data: categories, language-group lists, and app
    # config. These change on the order of days/weeks (admin-updated category/topic lists,
    # supported-language additions). A 6-hour write TTL is effectively permanent for users.
    reference-data:
      expire-after-write: 6h
      maximum-size: 50
    # Caches JilaliGateway.aiTranslate() — same (text, targetLang) pair is often requested by
    # several viewers translating the same popular comment. Write-based TTL since translations
    # don't change once produced.
    ai-translate:
      expire-after-write: 24h
      maximum-size: 5000

endpoints:
  all:
    enabled: true
    sensitive: false

datasources:
  default:
    url: jdbc:h2:file:${JILALI_DB_PATH:./data/jilalitalk};AUTO_SERVER=TRUE
    driverClassName: org.h2.Driver
    username: sa
    password: ""

jilali:
  # HelloTalk API auth token. Set LIVEHUB_AUTH_TOKEN env var.
  default-auth-token: ${LIVEHUB_AUTH_TOKEN:eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJleHAiOjE3ODU0Njc4MDksImlhdCI6MTc4Mjg3NTgwOSwic3JjIjoyLCJ1aWQiOjE2OTMzNTU2Mn0.c4Gsbkb8_2jX6ETUqrgNWsZANIcoUZxOvH6lqBhm2oU}
  # Optional HelloTalk account credentials — enables AuthTokenHolder to auto-relogin and
  # mint a fresh JWT when the upstream invalidates our session (status 105, "logged in on
  # another device"). Leave unset to disable auto-relogin (falls back to a clean disconnect).
  hellotalk-email: ${HELLOTALK_EMAIL:}
  hellotalk-password: ${HELLOTALK_PASSWORD:}
  # Allowed Origin headers for WebSocket connections to /ws/ht/{cname}.
  allowed-web-socket-origins:
    - "http://localhost:4200"
    - "http://localhost:4201"
    - "https://jilali-talk-frontend-sfrr-one.vercel.app"
  # Inbound headers forwarded verbatim to upstream on every call.
  forwarded-headers:
    - authorization
    - x-ht-token
    - x-ht-uid
    - x-ht-version
    - x-ht-os
    - x-ht-device
    - x-ht-lang
    - x-ht-channel
    - x-ht-did
    - x-ht-build
    - x-ht-timezone
    - x-ht-tzid
    - x-ht-os-version
    - x-ht-ui-mode
    - x-b3-traceid
    - x-b3-spanid
    - x-b3-sampled
    - x-request-start
    - user-agent
    - accept-language
  # HelloTalk server's static Curve25519 public key (hex). Set LIVEHUB_SERVER_PUB_KEY env var.
  server-pub-key-hex: ${LIVEHUB_SERVER_PUB_KEY:f684f611b895a5d3abc124a20ca2dfd397662318cfd4fd74b80aba478c17ca68}
  # Static Curve25519 public key (hex) for the AI translator service (api-global.hellotalk8.com/translate/*)
  # — a different microservice than livehub, with its own key. Set LIVEHUB_TRANSLATE_SERVER_PUB_KEY env var.
  translate-server-pub-key-hex: ${LIVEHUB_TRANSLATE_SERVER_PUB_KEY:5b1040dac31a5c2ff33f14508213a01273c7a40f5e346640bbca9a3e4b933a50}
  # Device ID sent to the HelloTalk userinfo endpoint. Set LIVEHUB_DEVICE_ID env var.
  device-id: ${LIVEHUB_DEVICE_ID:0cb9173191e58a7bad9bbdc9fede8b9e}
  # Device model string sent in the IM login packet. Set LIVEHUB_DEVICE_MODEL env var.
  device-model: ${LIVEHUB_DEVICE_MODEL:Redmi Note 13 Pro+#1220X2712#446#438#973#n#6.5}
  # AES-128 key for decrypting LiveHub's Agora token payloads (16 ASCII bytes).
  agora-cipher-key: ${LIVEHUB_AGORA_CIPHER_KEY:15helloTCJTALK20}

jackson:
  serialization:
    writeDatesAsTimestamps: true
  deserialization:
    FAIL_ON_UNKNOWN_PROPERTIES: false
