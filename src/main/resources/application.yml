micronaut:
  application:
    name: jilalibff
  server:
    port: 8080
    cors:
      enabled: true
      configurations:
        all:
          allowed-origins:
            - http://localhost:4200
            - http://localhost:4201
          allowed-methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
          allowed-headers:
            - Content-Type
            - Authorization
            - X-Requested-With
            - Accept
            - Origin
            - Access-Control-Request-Method
            - Access-Control-Request-Headers
          exposed-headers:
            - Access-Control-Allow-Origin
            - Access-Control-Allow-Credentials
          allow-credentials: true
          max-age: 3600
  router:
    static-resources:
      swagger:
        paths: classpath:META-INF/swagger
        mapping: /swagger/**
      swagger-ui:
        paths: classpath:META-INF/swagger/views/swagger-ui
        mapping: /swagger-ui/**
  executors:
    blocking:
      virtual: true
  http:
    services:
      jlhub:
        url: ${LIVEHUB_BASE_URL:`https://api-global.hellotalk8.com`}
        read-timeout: 10s
        connect-timeout: 5s
        security:
          enabled: false
      translate:
        url: ${LIVEHUB_TRANSLATE_BASE_URL:`https://api-global.hellotalk8.com`}
        read-timeout: 15s
        connect-timeout: 5s
        security:
          enabled: false
  serde:
    enabled: true
    deserialization:
      ignore-unknown: true
  openapi:
    views:
      spec: swagger-ui.enabled=true

endpoints:
  all:
    enabled: true
    sensitive: false

datasources:
  default:
    url: jdbc:h2:file:${JILALI_DB_PATH:./data/jilalitalk};AUTO_SERVER=TRUE
    driverClassName: org.h2.Driver
    username: sa
    password: ""

jilali:
  # Static public-key token for the HelloTalk translate service.
  # Set LIVEHUB_TRANSLATE_PUB_KEY environment variable in production.
  translate-pub-key: ${LIVEHUB_TRANSLATE_PUB_KEY:5b1040dac31a5c2ff33f14508213a01273c7a40f5e346640bbca9a3e4b933a50fef1b0f5e755a70a8873acddd85389e6c17d32bfcc878ec7832f7c21299c3724}
  # Allowed Origin headers for WebSocket connections to /ws/ht/{cname}.
  allowed-web-socket-origins:
    - "http://localhost:4200"
    - "http://localhost:4201"
  # Inbound headers forwarded verbatim to upstream on every call.
  forwarded-headers:
    - authorization
    - x-ht-token
    - x-ht-uid
    - x-ht-version
    - x-ht-os
    - x-ht-device
    - x-ht-lang
    - x-ht-channel
    - x-ht-did
    - x-ht-build
    - x-ht-timezone
    - x-ht-tzid
    - x-ht-os-version
    - x-ht-ui-mode
    - x-b3-traceid
    - x-b3-spanid
    - x-b3-sampled
    - x-request-start
    - user-agent
    - accept-language
  # HelloTalk server's static Curve25519 public key (hex). Set LIVEHUB_SERVER_PUB_KEY env var.
  server-pub-key-hex: ${LIVEHUB_SERVER_PUB_KEY:f684f611b895a5d3abc124a20ca2dfd397662318cfd4fd74b80aba478c17ca68}
  # Device ID sent to the HelloTalk userinfo endpoint. Set LIVEHUB_DEVICE_ID env var.
  device-id: ${LIVEHUB_DEVICE_ID:4050e6f3ca1a3029ba21a01f4e3f13ba}
  # AES-128 key for decrypting LiveHub's Agora token payloads (16 ASCII bytes).
  agora-cipher-key: ${LIVEHUB_AGORA_CIPHER_KEY:15helloTCJTALK20}

jackson:
  serialization:
    writeDatesAsTimestamps: true
  deserialization:
    FAIL_ON_UNKNOWN_PROPERTIES: false
