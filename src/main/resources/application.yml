micronaut:
  application:
    name: jilalibff
  server:
    port: 8080
    cors:
      enabled: true
      configurations:
        all:
          allowed-origins:
            - http://localhost:4200
            - http://localhost:4201
          allowed-methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
          allowed-headers:
            - Content-Type
            - Authorization
            - X-Requested-With
            - Accept
            - Origin
            - Access-Control-Request-Method
            - Access-Control-Request-Headers
          exposed-headers:
            - Access-Control-Allow-Origin
            - Access-Control-Allow-Credentials
          allow-credentials: true
          max-age: 3600
  router:
    static-resources:
      swagger:
        paths: classpath:META-INF/swagger
        mapping: /swagger/**
      swagger-ui:
        paths: classpath:META-INF/swagger/views/swagger-ui
        mapping: /swagger-ui/**
  executors:
    blocking:
      virtual: true
  http:
    services:
      jlhub:
        url: ${LIVEHUB_BASE_URL:`https://api-global.hellotalk8.com`}
        read-timeout: 10s
        connect-timeout: 5s
        security:
          enabled: false
  serde:
    enabled: true
    deserialization:
      ignore-unknown: true
  openapi:
    views:
      spec: swagger-ui.enabled=true

endpoints:
  all:
    enabled: true
    sensitive: false

# Application-specific knobs, bound via @ConfigurationProperties (JilaliProperties).
jilali:
  # Auth token used when the frontend sends no authorization header.
  # Set LIVEHUB_AUTH_TOKEN environment variable in production.
  default-auth-token: ${LIVEHUB_AUTH_TOKEN:eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJleHAiOjE3ODQxMTExMTUsImlhdCI6MTc4MTUxOTExNSwic3JjIjoyLCJ1aWQiOjE2OTMzNTU2Mn0.hyCMYVKtndZH6NUsMWCWCRgE54QzkBai9psuociazsw}
  # Inbound headers we forward verbatim to the upstream on every call.
  forwarded-headers:
    - authorization
    - x-ht-token
    - x-ht-uid
    - x-ht-version
    - x-ht-os
    - x-ht-device
    - x-ht-lang
    - x-ht-channel
    - x-ht-did
    - x-ht-build
    - x-ht-timezone
    - x-ht-tzid
    - x-ht-os-version
    - x-ht-ui-mode
    - x-b3-traceid
    - x-b3-spanid
    - x-b3-sampled
    - x-request-start
    - user-agent
    - accept-language
  # HelloTalk server's static Curve25519 public key (hex). Set LIVEHUB_SERVER_PUB_KEY env var.
  server-pub-key-hex: ${LIVEHUB_SERVER_PUB_KEY:f684f611b895a5d3abc124a20ca2dfd397662318cfd4fd74b80aba478c17ca68}
  # Device ID sent to the HelloTalk userinfo endpoint. Set LIVEHUB_DEVICE_ID env var.
  device-id: ${LIVEHUB_DEVICE_ID:4050e6f3ca1a3029ba21a01f4e3f13ba}
  # AES-128 key for decrypting LiveHub's Agora token payloads (16 ASCII bytes).
  agora-cipher-key: ${LIVEHUB_AGORA_CIPHER_KEY:15helloTCJTALK20}
  # HT IM login metadata — override with env vars in production.
  ht-im-operator: ${HT_IM_OPERATOR:unknown}
  ht-im-country: ${HT_IM_COUNTRY:US}
  device-model: ${HT_DEVICE_MODEL:samsung SM-G991B}

jackson:
  serialization:
    writeDatesAsTimestamps: true
  deserialization:
    FAIL_ON_UNKNOWN_PROPERTIES: false
